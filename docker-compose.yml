services:
  postgres:
    image: postgres:16-alpine
    container_name: photoopp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: photoopp
      POSTGRES_PASSWORD: photoopp
      POSTGRES_DB: photoopp
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
